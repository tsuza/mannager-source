name: Deploy to GitHub Releases

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            exe: mannager.exe
          - os: ubuntu-latest
            exe: mannager

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: target/release/${{ matrix.exe }}

  pack:
    needs: build
    strategy:
      matrix:
        include:
          - os: windows-latest
            exe: mannager.exe
            binary-artifact: binary-windows-latest
          - os: ubuntu-latest
            exe: mannager
            binary-artifact: binary-ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from Cargo.toml
        id: get-version
        shell: bash
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d '"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.binary-artifact }}
          path: staging

      - name: Fix binary permissions
        if: matrix.os == 'ubuntu-latest'
        run: chmod +x staging/${{ matrix.exe }}

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Pack Windows
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          vpk pack \
            -u net.tsuza.mannager \
            -v ${{ steps.get-version.outputs.version }} \
            -p staging \
            --mainExe mannager.exe \
            --packTitle mannager \
            --packAuthors "tsuza" \
            --icon assets/windows/mannager.ico \
            --releaseNotes CHANGELOG.md \
            --delta BestSize

      - name: Pack Linux
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          vpk pack \
            -u net.tsuza.mannager \
            -v ${{ steps.get-version.outputs.version }} \
            -p staging \
            --mainExe mannager \
            --packTitle mannager \
            --packAuthors "tsuza" \
            --icon assets/app_icon.png  \
            --releaseNotes CHANGELOG.md \
            --delta BestSize

      - name: Upload release files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: Releases/

  release:
    needs: pack
    runs-on: ubuntu-latest

    steps:
      - name: Get version from Cargo.toml
        id: get-version
        shell: bash
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d '"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Windows release files
        uses: actions/download-artifact@v4
        with:
          name: release-windows-latest
          path: release-files

      - name: Download Linux release files
        uses: actions/download-artifact@v4
        with:
          name: release-ubuntu-latest
          path: release-files

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get-version.outputs.version }}
          name: v${{ steps.get-version.outputs.version }}
          body_path: CHANGELOG.md
          files: release-files/*
